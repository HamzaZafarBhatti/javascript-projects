<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown Timer</title>
    <!-- font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" />
    <!-- styles -->
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <section class="section-center">
        <article class="gift-img">
            <img src="./gift.jpeg" alt="gift img">
        </article>
        <article class="gift-info">
            <h3>Old iPhone giveaway</h3>
            <h4 class="giveaway">
                
            </h4>
            <p>
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Veniam ad quae alias distinctio, unde vero, est perspiciatis aliquam facilis libero cupiditate sequi fugit! Nihil ea neque pariatur quisquam, et dignissimos.
            </p>
            <div class="deadline">
                <div class="deadline-format">
                    <div>
                        <h4 class="days"></h4>
                        <span>days</span>
                    </div>
                </div>
                <div class="deadline-format">
                    <div>
                        <h4 class="hours"></h4>
                        <span>hours</span>
                    </div>
                </div>
                <div class="deadline-format">
                    <div>
                        <h4 class="minutes"></h4>
                        <span>mins</span>
                    </div>
                </div>
                <div class="deadline-format">
                    <div>
                        <h4 class="seconds"></h4>
                        <span>secs</span>
                    </div>
                </div>
            </div>
        </article>
    </section>
    <!-- javascript -->
    <script src="./app.js"></script>
</body>

</html>
